name: Build packages

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.package }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: spc2vgm-macos-intel
            runner: macos-15-intel
            cmake_args: -DCMAKE_OSX_ARCHITECTURES=x86_64
          - package: spc2vgm-macos-apple-silicon
            runner: macos-15
            cmake_args: -DCMAKE_OSX_ARCHITECTURES=arm64
          - package: spc2vgm-windows-intel
            runner: windows-2022
            cmake_args: -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static
          - package: spc2vgm-linux-intel
            runner: ubuntu-24.04
            cmake_args: ""
          - package: spc2vgm-linux-arm
            runner: ubuntu-24.04-arm
            cmake_args: ""

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          for attempt in 1 2 3; do
            # Ubuntu ports mirrors can briefly serve package indexes from
            # different sync generations, causing hash/size mismatch errors.
            sudo rm -rf /var/lib/apt/lists/*
            if sudo apt-get -o Acquire::Retries=3 update; then
              break
            fi
            if [[ "$attempt" == 3 ]]; then
              echo "apt-get update failed after $attempt attempts" >&2
              exit 1
            fi
            sleep $((attempt * 15))
          done
          sudo apt-get -o Acquire::Retries=3 install -y zlib1g-dev

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: vcpkg install zlib:x64-windows-static

      - name: Configure
        shell: bash
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/package/${{ matrix.package }}"
          ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install package
        run: cmake --install build --config Release

      - name: Smoke test
        shell: bash
        run: |
          package="${{ github.workspace }}/package/${{ matrix.package }}"
          executable_suffix=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then executable_suffix=".exe"; fi
          "$package/bin/spc2vgm$executable_suffix" --help
          vgm_cmp_output=$("$package/bin/vgm_cmp$executable_suffix" 2>&1 || true)
          grep -q "VGM Compressor" <<< "$vgm_cmp_output"
          unarr_output=$("$package/bin/unarr_extract$executable_suffix" 2>&1 || true)
          grep -q "Usage:" <<< "$unarr_output"
          python "$package/scripts/package_vgmrips.py" --help
          python "$package/scripts/fetch_snesmusic.py" --help
          test -f "$package/scripts/package_vgmrips.cmd"
          test -f "$package/scripts/fetch_snesmusic.cmd"
          test -f "$package/licenses/vgmtools-GPL-2.0.txt"
          test -f "$package/licenses/unarr-LGPL-3.0.txt"
          test -f "$package/THIRD_PARTY_NOTICES.md"

      - name: Create ZIP
        shell: bash
        working-directory: package
        run: cmake -E tar cf "../${{ matrix.package }}.zip" --format=zip "${{ matrix.package }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: ${{ matrix.package }}.zip
          if-no-files-found: error

  release:
    name: Publish release packages
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
